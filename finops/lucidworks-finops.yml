specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Lucidworks
providerId: lucidworks
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - FinOps
  - FOCUS
  - Enterprise Search
  - Vector Search
  - AI Infrastructure
description: 'FOCUS-aligned FinOps for Lucidworks: enterprise contract-based pricing for AI Platform
  and Fusion. Cost is contract-driven; consumption meters are query-volume, document-volume, embedding
  inference, and Fusion compute footprint.'
sources:
  - https://lucidworks.com/
notes: No public pricing/billing docs at reconciliation time; meter list reflects typical billable
  lines for enterprise search platforms.
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Lucidworks, Inc.
serviceCategory: Enterprise Search
billingModel:
  pricingCategory: Enterprise Contract
  billingFrequency: Annual
  billingCurrency: USD
  chargeCategories:
    - Usage
    - Purchase
    - Tax
    - Adjustment
focusColumns:
  ServiceName: Lucidworks
  ServiceCategory: Enterprise Search
  ProviderName: Lucidworks
  PublisherName: Lucidworks, Inc.
  InvoiceIssuerName: Lucidworks, Inc.
  BillingCurrency: USD
meters:
  - name: queries
    unit: query
    aggregation: sum
    dimensions:
      - app
      - tenant
  - name: documents_indexed
    unit: document
    aggregation: sum
    dimensions:
      - tenant
  - name: embedding_inferences
    unit: inference
    aggregation: sum
    dimensions:
      - model
      - tenant
  - name: ai_platform_calls
    unit: request
    aggregation: sum
    dimensions:
      - api
      - tenant
  - name: fusion_compute
    unit: instance-hour
    aggregation: sum
    dimensions:
      - cluster
principles:
  - name: Visibility
    description: Pull tenant query / index / inference metrics from the Lucidworks admin UI; cross-reference
      against contracted volumes.
  - name: Allocation
    description: Map Lucidworks tenants/apps to internal product lines; tag signals events for chargeback.
  - name: Optimization
    description: Use rules / query rewrites to reduce inference cost; cache embeddings; tune Fusion cluster
      sizing to actual load.
  - name: Accountability
    description: Owners review contracted-volume burn quarterly; renegotiate at renewal if growth changes
      mix between AI Platform inference and Fusion compute.
