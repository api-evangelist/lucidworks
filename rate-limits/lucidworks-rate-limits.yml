specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Lucidworks
providerId: lucidworks
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Rate Limiting
  - Enterprise Search
  - Vector Search
description: Lucidworks does not publish public per-second rate limits for its AI Platform or Fusion APIs.
  Limits are scoped by enterprise contract and tenant capacity. Replace with concrete numbers when
  Lucidworks docs surface a public table.
sources:
  - https://lucidworks.com/
  - https://doc.lucidworks.com/
notes: No public rate-limits documentation reachable at reconciliation time.
responseCodes:
  throttled: 429
  quotaExceeded: 429
  serviceUnavailable: 503
limits:
  - name: AI Platform requests
    scope: tenant
    metric: varies
    limit: 'see contract / tenant capacity'
  - name: Fusion REST API
    scope: cluster
    metric: varies
    limit: 'governed by deployed Fusion cluster sizing'
policies:
  - name: Tenant capacity
    description: AI Platform requests are bounded by per-tenant capacity defined at contract time.
  - name: Self-managed Fusion
    description: Fusion REST API throughput is bounded by customer-deployed cluster sizing rather than
      a vendor rate limit.
  - name: Backoff
    description: On 429 / 503, retry with exponential backoff and respect Retry-After when present.
