description: Lucidworks (AI Platform / Fusion) sells through enterprise sales with custom contracts. Public
  pricing is not published; Lucidworks publishes product pages but routes pricing requests to a contact
  form. Treat as enterprise-only until Lucidworks publishes a public plans page.
sources:
  - https://lucidworks.com/
notes: Lucidworks pricing pages returned 403 / are gated behind sales; values are enterprise-contract scaffold.
plans:
  - id: lucidworks-enterprise
    name: Enterprise (Contact Sales)
    type: enterprise
    description: Custom enterprise contract for Lucidworks AI Platform / Fusion. Includes managed search,
      embeddings, signals, query rewrites, chunking, model management. Pricing is not publicly disclosed.
    entries:
      - label: Custom contract
        name: custom
        type: subscription
        metric: contract
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: AI Platform / Fusion access
      - name: Embeddings & Classification
      - name: Signals & Rules
      - name: Content Chunking
      - name: Model Management
      - name: Enterprise SLA & support
