    port: 9090
    transport: http
    description: MCP adapter for Lucidworks Rules and Query Rewrites API — Rules. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: list-rules
      description: List rules
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: rules-rules.listrules
      outputParameters:
      - type: object
        mapping: $.
    - name: create-rule
      description: Create a rule
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: rules-rules.createrule
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-rule
      description: Get a rule
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: rules-rules.getrule
      with:
        ruleId: tools.ruleId
      outputParameters:
      - type: object
        mapping: $.
    - name: update-rule
      description: Update a rule
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: rules-rules.updaterule
      with:
        ruleId: tools.ruleId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-rule
      description: Delete a rule
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: rules-rules.deleterule
      with:
        ruleId: tools.ruleId
      outputParameters:
      - type: object
        mapping: $.
