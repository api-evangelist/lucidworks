naftiko: 1.0.0-alpha2
info:
  label: Lucidworks Rules and Query Rewrites API — Rules
  description: 'Lucidworks Rules and Query Rewrites API — Rules. 5 operations. Lead operation: List rules. Self-contained
    Naftiko capability covering one Lucidworks business surface.'
  tags:
  - Lucidworks
  - Rules
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    LUCIDWORKS_API_KEY: LUCIDWORKS_API_KEY
capability:
